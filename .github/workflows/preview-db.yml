name: Preview Database

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths-ignore:
      - "ROADMAP.md"
      - "PROJECT_STATUS.md"
      - "CLAUDE.md"
      - "AGENTS.md"
      - "web/AGENTS.md"
      - "docs/**"
      - ".tmp/**"
      - ".claude/**"
      - ".agents/**"

jobs:
  manage-preview-db:
    runs-on: ubuntu-latest
    steps:
      # --- SETUP ---
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute names
        id: names
        run: |
          BRANCH="${{ github.head_ref }}"
          # Neon branch name: lowercase, hyphens, prefix
          NEON_BRANCH="preview-$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-zA-Z0-9]/-/g')"
          # Vercel env var suffix: uppercase, underscores
          ENV_SUFFIX="$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/_/g' | tr '[:lower:]' '[:upper:]')"
          echo "neon_branch=$NEON_BRANCH" >> $GITHUB_OUTPUT
          echo "env_suffix=$ENV_SUFFIX" >> $GITHUB_OUTPUT

      # --- CREATE (on open/sync/reopen) ---
      - name: Get branch expiration date
        if: github.event.action != 'closed'
        id: expiration
        run: |
          echo "expires_at=$(date -u --date '+7 days' +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Create Neon branch
        if: github.event.action != 'closed'
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: ${{ steps.names.outputs.neon_branch }}
          parent_branch: main
          expires_at: ${{ steps.expiration.outputs.expires_at }}

      - name: Check for new migrations
        if: github.event.action != 'closed'
        id: migrations
        run: |
          NEW_MIGRATIONS=$(git diff --name-only origin/main...HEAD | grep "^web/prisma/migrations/" || true)
          if [ -n "$NEW_MIGRATIONS" ]; then
            echo "has_migrations=true" >> $GITHUB_OUTPUT
            echo "Found new migrations:"
            echo "$NEW_MIGRATIONS"
          else
            echo "has_migrations=false" >> $GITHUB_OUTPUT
            echo "No new migrations found"
          fi

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: cd web && npm install

      - name: Run migrations on preview branch
        if: github.event.action != 'closed' && steps.migrations.outputs.has_migrations == 'true'
        run: cd web && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}

      - name: Run all seed scripts
        if: github.event.action != 'closed'
        run: |
          cd web
          npx tsx prisma/seed.ts
          npx tsx prisma/seed_cafes.ts
          npx tsx prisma/seed_cafe_roasters_explicit.ts
          npx tsx prisma/seed_user_profiles.ts
          npx tsx prisma/seed_reviews.ts
          npx tsx prisma/seed_profile_events.ts
          npx tsx prisma/seed_saved_roasters.ts
          npx tsx prisma/seed_admin_notes.ts
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}

      - name: Upsert Vercel env var
        if: github.event.action != 'closed'
        run: |
          BRANCH="${{ github.head_ref }}"
          ENV_VALUE="${{ steps.neon.outputs.db_url_pooled }}"
          PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID }}"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          # Compute sanitized branch name for env var key
          ENV_SUFFIX="$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/_/g' | tr '[:lower:]' '[:upper:]')"
          ENV_KEY="DATABASE_URL_${ENV_SUFFIX}"

          # Find existing env var for this branch
          EXISTING_ID=$(curl -s \
            "https://api.vercel.com/v9/projects/${PROJECT_ID}/env?decrypt=false" \
            -H "Authorization: Bearer ${TOKEN}" \
            | jq -r --arg key "$ENV_KEY" '.envs[] | select(.key == $key) | .id // empty')

          # Delete if exists
          if [ -n "$EXISTING_ID" ]; then
            echo "Deleting existing $ENV_KEY (id: $EXISTING_ID)"
            curl -s -X DELETE \
              "https://api.vercel.com/v9/projects/${PROJECT_ID}/env/${EXISTING_ID}" \
              -H "Authorization: Bearer ${TOKEN}"
          fi

          # Create branch-specific DATABASE_URL — used by getDatabaseUrl() in preview builds
          echo "Creating $ENV_KEY for branch: $BRANCH"
          curl -s -X POST \
            "https://api.vercel.com/v9/projects/${PROJECT_ID}/env" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"key\": \"${ENV_KEY}\",
              \"value\": \"${ENV_VALUE}\",
              \"type\": \"plain\",
              \"target\": [\"preview\"]
            }"

      # --- DESTROY (on closed) ---
      - name: Delete Vercel env var
        if: github.event.action == 'closed'
        run: |
          BRANCH="${{ github.head_ref }}"
          PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID }}"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          ENV_SUFFIX="$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/_/g' | tr '[:lower:]' '[:upper:]')"
          ENV_KEY="DATABASE_URL_${ENV_SUFFIX}"

          EXISTING_ID=$(curl -s \
            "https://api.vercel.com/v9/projects/${PROJECT_ID}/env?decrypt=false" \
            -H "Authorization: Bearer ${TOKEN}" \
            | jq -r --arg key "$ENV_KEY" '.envs[] | select(.key == $key) | .id // empty')

          if [ -n "$EXISTING_ID" ]; then
            echo "Deleting $ENV_KEY for branch: $BRANCH (id: $EXISTING_ID)"
            curl -s -X DELETE \
              "https://api.vercel.com/v9/projects/${PROJECT_ID}/env/${EXISTING_ID}" \
              -H "Authorization: Bearer ${TOKEN}"
          else
            echo "$ENV_KEY for $BRANCH not found, skipping"
          fi

      - name: Delete Neon branch
        if: github.event.action == 'closed'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: ${{ steps.names.outputs.neon_branch }}
