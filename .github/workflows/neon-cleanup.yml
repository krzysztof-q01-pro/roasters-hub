name: Cleanup Neon Branches

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: List and delete old preview branches
        run: |
          echo "Fetching Neon branches..."
          RESPONSE=$(curl -s \
            "https://console.neon.tech/api/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Accept: application/json")
          
          echo "$RESPONSE" | jq -r '.branches[] | select(.name | startswith("preview-")) | "\(.name) | \(.id) | \(.created_at)"' || echo "No preview branches found"
          
          echo ""
          echo "Deleting preview branches..."
          echo "$RESPONSE" | jq -r '.branches[] | select(.name | startswith("preview-")) | .id' | while read -r BRANCH_ID; do
            echo "Deleting branch: $BRANCH_ID"
            curl -s -X DELETE \
              "https://console.neon.tech/api/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches/${BRANCH_ID}" \
              -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}"
          done
          
          echo "Done!"
