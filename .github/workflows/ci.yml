name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Lint · Type check · Unit tests ─────────────────────────────────
  lint-typecheck-test:
    name: Lint, Type Check & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm install

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Unit Tests (with coverage)
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: web/coverage/lcov.info

      - name: Build
        run: npm run build
        env:
          # Placeholder values — sufficient for build-time checks
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
          CLERK_SECRET_KEY: sk_test_placeholder
          DATABASE_URL: postgresql://placeholder/placeholder
          RESEND_API_KEY: re_placeholder

  # ─── Job 2: Integration tests (Neon ephemeral branch) ──────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Create ephemeral Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: ci-${{ github.run_id }}-${{ github.run_attempt }}
          username: neondb_owner

      - run: npm install

      - name: Run DB migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_with_pooler }}
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}

      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_with_pooler }}
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}

      - name: Delete ephemeral Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: ${{ steps.neon.outputs.branch_id }}
          api_key: ${{ secrets.NEON_API_KEY }}
