name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test-build:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Tests
        run: npm run test:ci

      # Build step skipped: Next.js SSG requires live DB connection
      # for generateStaticParams. Vercel handles builds with real env vars.
      # TODO: add build step when CI has access to a test database
