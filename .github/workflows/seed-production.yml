name: Seed Production Database

on:
  push:
    branches: [main]
    paths:
      - "web/prisma/seed*.ts"
  workflow_dispatch: # Allow manual trigger

jobs:
  seed-production:
    name: Seed Production DB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Get DATABASE_URL from Vercel
        id: vercel-env
        run: |
          PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID }}"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          # Fetch DATABASE_URL from Vercel (find env var that has "production" in targets)
          DB_URL=$(curl -s \
            "https://api.vercel.com/v9/projects/${PROJECT_ID}/env?decrypt=true" \
            -H "Authorization: Bearer ${TOKEN}" \
            | jq -r '.envs[] | select(.key == "DATABASE_URL") | select(.target | index("production")) | .value // empty')

          if [ -z "$DB_URL" ]; then
            echo "Error: Could not fetch DATABASE_URL from Vercel"
            exit 1
          fi

          echo "db_url=${DB_URL}" >> $GITHUB_OUTPUT
          echo "✅ Fetched DATABASE_URL from Vercel"

      - run: npm install

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.vercel-env.outputs.db_url }}
          DIRECT_URL: ${{ steps.vercel-env.outputs.db_url }}

      - name: Seed Cafes
        run: npx tsx prisma/seed_cafes.ts
        env:
          DATABASE_URL: ${{ steps.vercel-env.outputs.db_url }}
          DIRECT_URL: ${{ steps.vercel-env.outputs.db_url }}

      - name: Seed Cafe-Roaster Relations
        run: npx tsx prisma/seed_cafe_roasters_random.ts
        env:
          DATABASE_URL: ${{ steps.vercel-env.outputs.db_url }}
          DIRECT_URL: ${{ steps.vercel-env.outputs.db_url }}
