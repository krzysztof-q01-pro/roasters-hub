name: Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "web/prisma/seed*.ts"
      - "web/prisma/migrations/**"
      - ".github/workflows/production-deploy.yml"

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: Lint, Type Check & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm install

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm run test

  migrate-and-seed:
    name: Migrate & Seed Production DB
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "❌ Error: DATABASE_URL secret is not set"
            echo ""
            echo "To fix this, add the following secrets to GitHub:"
            echo "1. Go to: https://github.com/BeanMap/roasters-hub/settings/secrets/actions"
            echo "2. Click 'New repository secret'"
            echo "3. Add DATABASE_URL (get value from Vercel Dashboard)"
            echo "4. Add DIRECT_URL (same as DATABASE_URL or use direct Neon host)"
            exit 1
          fi
          echo "✅ DATABASE_URL is configured"

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Seed Roasters
        if: contains(github.event.head_commit.message, 'seed') || contains(github.event.head_commit.modified, 'prisma/seed.ts')
        run: npx tsx prisma/seed.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Seed Cafes
        if: contains(github.event.head_commit.message, 'seed') || contains(github.event.head_commit.modified, 'prisma/seed_cafes.ts')
        run: npx tsx prisma/seed_cafes.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Seed Cafe-Roaster Relations
        if: contains(github.event.head_commit.message, 'seed') || contains(github.event.head_commit.modified, 'prisma/seed_cafe_roasters_explicit.ts')
        run: npx tsx prisma/seed_cafe_roasters_explicit.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Seed User Profiles
        if: contains(github.event.head_commit.message, 'seed') || contains(github.event.head_commit.modified, 'prisma/seed_user_profiles.ts')
        run: npx tsx prisma/seed_user_profiles.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Seed Reviews
        if: contains(github.event.head_commit.message, 'seed') || contains(github.event.head_commit.modified, 'prisma/seed_reviews.ts')
        run: npx tsx prisma/seed_reviews.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Seed Profile Events
        if: contains(github.event.head_commit.message, 'seed') || contains(github.event.head_commit.modified, 'prisma/seed_profile_events.ts')
        run: npx tsx prisma/seed_profile_events.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Seed Saved Roasters
        if: contains(github.event.head_commit.message, 'seed') || contains(github.event.head_commit.modified, 'prisma/seed_saved_roasters.ts')
        run: npx tsx prisma/seed_saved_roasters.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Seed Admin Notes
        if: contains(github.event.head_commit.message, 'seed') || contains(github.event.head_commit.modified, 'prisma/seed_admin_notes.ts')
        run: npx tsx prisma/seed_admin_notes.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Log deployment summary
        run: |
          echo "✅ Production database updated successfully"
          echo "Migrations: applied"
          echo "Seed: ${{ contains(github.event.head_commit.message, 'seed') && 'executed' || 'skipped' }}"

  # Note: Vercel automatically deploys on push to main
  # This workflow focuses on database migrations and seeding
  # Vercel deployment status can be monitored at:
  # https://vercel.com/krzysztof-8092s-projects/beanmap-web
