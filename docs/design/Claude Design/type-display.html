<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Source Sans 3', sans-serif; background: #f9f9f7; padding: 20px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #897267; margin-bottom: 10px; }
  .spacing-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 16px; }
  .space-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .space-bar { background: #ffdbc9; border: 1.5px solid #ffb68d; border-radius: 3px; width: 18px; }
  .space-label { font-size: 9px; color: #897267; font-family: monospace; text-align: center; }
  .space-px { font-size: 9px; color: #564338; font-weight: 600; }
</style>
</head><body>

<div class="section-label">Spacing Scale — 4px base unit</div>
<div class="spacing-row">
  <div class="space-block"><div class="space-bar" style="height:4px"></div><div class="space-px">4</div><div class="space-label">space-1</div></div>
  <div class="space-block"><div class="space-bar" style="height:8px"></div><div class="space-px">8</div><div class="space-label">space-2</div></div>
  <div class="space-block"><div class="space-bar" style="height:12px"></div><div class="space-px">12</div><div class="space-label">space-3</div></div>
  <div class="space-block"><div class="space-bar" style="height:16px"></div><div class="space-px">16</div><div class="space-label">space-4</div></div>
  <div class="space-block"><div class="space-bar" style="height:20px"></div><div class="space-px">20</div><div class="space-label">space-5</div></div>
  <div class="space-block"><div class="space-bar" style="height:24px"></div><div class="space-px">24</div><div class="space-label">space-6</div></div>
  <div class="space-block"><div class="space-bar" style="height:32px"></div><div class="space-px">32</div><div class="space-label">space-8</div></div>
  <div class="space-block"><div class="space-bar" style="height:40px"></div><div class="space-px">40</div><div class="space-label">space-10</div></div>
  <div class="space-block"><div class="space-bar" style="height:48px"></div><div class="space-px">48</div><div class="space-label">space-12</div></div>
  <div class="space-block"><div class="space-bar" style="height:64px"></div><div class="space-px">64</div><div class="space-label">space-16</div></div>
  <div class="space-block"><div class="space-bar" style="height:80px"></div><div class="space-px">80</div><div class="space-label">space-20</div></div>
  <div class="space-block"><div class="space-bar" style="height:96px"></div><div class="space-px">96</div><div class="space-label">space-24</div></div>
</div>

<div class="section-label">Common Layout Sizes</div>
<div style="display:flex;flex-direction:column;gap:6px">
  <div style="display:flex;align-items:center;gap:8px">
    <div style="width:300px;height:8px;background:#eeeeec;border-radius:2px;border:1px dashed #dcc1b3"></div>
    <span style="font-size:10px;font-family:monospace;color:#897267">300px — sidebar width</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div style="width:400px;height:8px;background:#eeeeec;border-radius:2px;border:1px dashed #dcc1b3"></div>
    <span style="font-size:10px;font-family:monospace;color:#897267">400px — map sidebar / search input</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div style="width:60px;height:8px;background:#974400;border-radius:2px;opacity:0.4"></div>
    <span style="font-size:10px;font-family:monospace;color:#897267">60px — top bar height</span>
  </div>
</div>
</body></html>
