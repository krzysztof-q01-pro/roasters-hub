<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Source Sans 3', sans-serif; background: #f9f9f7; padding: 18px 20px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #897267; margin-bottom: 8px; }
  .group { margin-bottom: 16px; }

  /* Search bar */
  .search-bar { display: flex; align-items: center; background: #f4f4f2; border-radius: 10px; overflow: hidden; width: 360px; }
  .search-toggle { padding: 10px 12px; display: flex; align-items: center; justify-content: center; border-right: 1px solid rgba(220,193,179,0.4); }
  .search-toggle.active-roasters { background: #974400; color: white; }
  .search-toggle.active-cafes { background: #2c694e; color: white; }
  .search-toggle.inactive { color: #897267; }
  .search-input-wrap { display: flex; align-items: center; padding: 10px 14px; flex: 1; }
  .search-icon { width: 16px; height: 16px; color: rgba(86,67,56,0.5); margin-right: 8px; flex-shrink: 0; }
  .search-placeholder { font-size: 14px; color: rgba(86,67,56,0.5); }

  /* Text input */
  .text-input { font-family: 'Source Sans 3', sans-serif; font-size: 15px; background: white; border: 1.5px solid #dcc1b3; border-radius: 8px; padding: 10px 14px; color: #1a1c1b; width: 280px; outline: none; }
  .text-input.focused { border-color: #974400; box-shadow: 0 0 0 3px #ffdbc9; }
  .text-input::placeholder { color: rgba(86,67,56,0.5); }

  /* Textarea */
  .textarea { font-family: 'Source Sans 3', sans-serif; font-size: 14px; background: white; border: 1.5px solid #dcc1b3; border-radius: 8px; padding: 10px 14px; color: #1a1c1b; width: 360px; height: 72px; outline: none; resize: none; }

  /* Filter chips */
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { display:inline-flex;font-size:13px;font-weight:500;padding:5px 14px;border-radius:9999px;border:1.5px solid #dcc1b3;background:transparent;color:#564338; }
  .chip-active { background:#ffdbc9;color:#974400;border-color:#974400; }
  .chip-roast { display:inline-flex;font-size:12px;font-weight:600;padding:5px 14px;border-radius:9999px;border:1.5px solid #dcc1b3;background:transparent;color:#564338; }
  .chip-roast-active { background:#1a1c1b;color:white;border-color:#1a1c1b; }

  /* Step indicator */
  .step-row { display: flex; align-items: center; gap: 0; }
  .step { display: flex; align-items: center; gap: 6px; }
  .step-circle { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .step-label { font-size: 12px; font-weight: 600; }
  .step-line { width: 40px; height: 1.5px; margin: 0 8px; }
</style>
</head><body>

<div class="group">
  <div class="section-label">Search Bar (Header)</div>
  <div class="search-bar">
    <div class="search-toggle active-roasters">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><ellipse cx="12" cy="14" rx="6" ry="4"/><path d="M12 4c-1.5 0-3 .8-4 2l1.5 1c.6-.8 1.5-1.3 2.5-1.3s1.9.5 2.5 1.3L16 6c-1-1.2-2.5-2-4-2z"/></svg>
    </div>
    <div class="search-toggle active-cafes" style="background:#2c694e">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 3H6c-1.1 0-2 .9-2 2v5.71c0 3.83 2.95 7.18 6.78 7.29 3.96.12 7.22-3.06 7.22-7v-1h.5c1.93 0 3.5-1.57 3.5-3.5S20.43 3 18.5 3zm0 5H17V5h1.5c.83 0 1.5.67 1.5 1.5S19.33 8 18.5 8z"/><path d="M4 19h16v2H4z"/></svg>
    </div>
    <div class="search-input-wrap">
      <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <span class="search-placeholder">Search cafes...</span>
    </div>
  </div>
</div>

<div class="group">
  <div class="section-label">Text Input — States</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start">
    <div>
      <input class="text-input" placeholder="Roastery name" readonly>
      <div style="font-size:10px;color:#897267;margin-top:3px">Default</div>
    </div>
    <div>
      <input class="text-input focused" value="Hard Beans" readonly>
      <div style="font-size:10px;color:#897267;margin-top:3px">Focused</div>
    </div>
    <div>
      <input class="text-input" style="border-color:#ba1a1a;box-shadow:0 0 0 3px #ffdad6" placeholder="Required field" readonly>
      <div style="font-size:10px;color:#ba1a1a;margin-top:3px">Error</div>
    </div>
  </div>
</div>

<div class="group">
  <div class="section-label">Filter Chips — Country / Origin</div>
  <div class="chip-row">
    <span class="chip chip-active">✓ Ethiopia</span>
    <span class="chip">Kenya</span>
    <span class="chip">Colombia</span>
    <span class="chip">Brazil</span>
    <span class="chip">Peru</span>
    <span class="chip">Rwanda</span>
  </div>
</div>

<div class="group">
  <div class="section-label">Roast Style Toggle Chips</div>
  <div class="chip-row">
    <span class="chip-roast chip-roast-active">Light</span>
    <span class="chip-roast">Medium</span>
    <span class="chip-roast">Dark</span>
    <span class="chip-roast">Espresso</span>
    <span class="chip-roast">Filter</span>
  </div>
</div>

<div class="group">
  <div class="section-label">Form Step Indicator</div>
  <div class="step-row">
    <div class="step">
      <div class="step-circle" style="background:#2c694e;color:white">✓</div>
      <span class="step-label" style="color:#2c694e">Basic Info</span>
    </div>
    <div class="step-line" style="background:#974400"></div>
    <div class="step">
      <div class="step-circle" style="background:#974400;color:white">2</div>
      <span class="step-label" style="color:#974400">Contact & Links</span>
    </div>
    <div class="step-line" style="background:#dcc1b3"></div>
    <div class="step">
      <div class="step-circle" style="background:#eeeeec;color:#897267">3</div>
      <span class="step-label" style="color:#897267">Specialty Details</span>
    </div>
  </div>
</div>

</body></html>
