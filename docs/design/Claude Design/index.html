<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Fraunces', Georgia, serif; background: #f9f9f7; padding: 20px 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid #e8e8e6; padding: 10px 0; }
  .row:last-child { border-bottom: none; }
  .meta { font-family: 'Source Sans 3', monospace, sans-serif; font-size: 10px; color: #897267; width: 110px; flex-shrink: 0; line-height: 1.5; }
  .specimen { color: #1a1c1b; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .tag { font-family: monospace; font-size: 9px; background: #eeeeec; color: #564338; padding: 2px 5px; border-radius: 3px; display: inline-block; margin-bottom: 2px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">
</head><body>

<div class="row">
  <div class="meta"><div class="tag">Display XL</div><br>56px / 600<br>−0.02em tracking</div>
  <div class="specimen" style="font-size:56px;font-weight:600;letter-spacing:-0.02em;line-height:1.1">Discover Coffee</div>
</div>

<div class="row">
  <div class="meta"><div class="tag">Display L</div><br>40px / 600<br>−0.02em tracking</div>
  <div class="specimen" style="font-size:40px;font-weight:600;letter-spacing:-0.02em;line-height:1.1">Specialty Roasters</div>
</div>

<div class="row">
  <div class="meta"><div class="tag">Display M</div><br>32px / 600<br>−0.02em tracking</div>
  <div class="specimen" style="font-size:32px;font-weight:600;letter-spacing:-0.02em;line-height:1.15">Featured Roasters</div>
</div>

<div class="row">
  <div class="meta"><div class="tag">Display M Italic</div><br>32px / 400 italic</div>
  <div class="specimen" style="font-size:32px;font-weight:400;font-style:italic;letter-spacing:-0.01em;line-height:1.2">Crafted for the Sensory Curator</div>
</div>

<div class="row">
  <div class="meta"><div class="tag">Large Number</div><br>48px / 700<br>Fraunces</div>
  <div class="specimen" style="font-size:48px;font-weight:700;letter-spacing:-0.02em;line-height:1">50+&nbsp;<span style="font-size:16px;font-weight:400;color:#897267;font-family:'Source Sans 3',sans-serif;letter-spacing:0">Roasters</span></div>
</div>

</body></html>
