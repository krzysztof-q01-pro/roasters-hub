<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Source Sans 3', sans-serif; background: #f9f9f7; padding: 20px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #897267; margin-bottom: 10px; }
  .group { margin-bottom: 18px; }
  .btn-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; font-family: 'Source Sans 3', sans-serif; font-weight: 600; font-size: 14px; border-radius: 8px; padding: 8px 18px; cursor: pointer; border: 1.5px solid transparent; letter-spacing: -0.01em; }
  .btn-sm { padding: 5px 12px; font-size: 11px; }
  .btn-lg { padding: 12px 24px; font-size: 16px; }
  .btn-primary { background: #974400; color: white; border-color: #974400; }
  .btn-secondary { background: transparent; color: #974400; border-color: #974400; }
  .btn-ghost { background: transparent; color: #974400; border: none; padding-left: 0; }
  .btn-destructive { background: #ba1a1a; color: white; border-color: #ba1a1a; }
  .btn-disabled { background: #eeeeec; color: #897267; border-color: #eeeeec; cursor: not-allowed; }
  .btn-loading { background: #b95a14; color: white; border-color: #b95a14; }
  .state-label { font-size: 10px; color: #897267; margin-top: 4px; text-align: center; }
  .state-col { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; }
</style>
</head><body>

<div class="group">
  <div class="section-label">Button Variants</div>
  <div class="btn-row">
    <div class="state-col">
      <div class="btn btn-primary">Browse Roasters ↗</div>
      <div class="state-label">Primary</div>
    </div>
    <div class="state-col">
      <div class="btn btn-secondary">List Your Roastery</div>
      <div class="state-label">Secondary</div>
    </div>
    <div class="state-col">
      <div class="btn btn-ghost">↗ Share</div>
      <div class="state-label">Ghost</div>
    </div>
    <div class="state-col">
      <div class="btn btn-destructive">Reject</div>
      <div class="state-label">Destructive</div>
    </div>
  </div>
</div>

<div class="group">
  <div class="section-label">States</div>
  <div class="btn-row">
    <div class="state-col">
      <div class="btn btn-primary">Subscribe</div>
      <div class="state-label">Default</div>
    </div>
    <div class="state-col">
      <div class="btn btn-primary" style="background:#a85218;border-color:#a85218">Subscribe</div>
      <div class="state-label">Hover</div>
    </div>
    <div class="state-col">
      <div class="btn btn-disabled">Subscribe</div>
      <div class="state-label">Disabled</div>
    </div>
    <div class="state-col">
      <div class="btn btn-loading">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        Loading
      </div>
      <div class="state-label">Loading</div>
    </div>
  </div>
</div>

<div class="group">
  <div class="section-label">Sizes</div>
  <div class="btn-row" style="align-items:center">
    <div class="state-col">
      <div class="btn btn-primary btn-sm">Browse</div>
      <div class="state-label">SM — 32px</div>
    </div>
    <div class="state-col">
      <div class="btn btn-primary">Browse Roasters</div>
      <div class="state-label">MD — 40px</div>
    </div>
    <div class="state-col">
      <div class="btn btn-primary btn-lg">Browse Roasters ↗</div>
      <div class="state-label">LG — 48px</div>
    </div>
  </div>
</div>

</body></html>
